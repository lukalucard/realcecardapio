<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RealceCardápio - Pedidos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/pedidos.css">
</head>
<body>
    
    <div class="cardapio-container">
        <div id="sidebar-container"></div>

        <main class="cardapio-main-content">
            
            <header class="page-header">
                <div class="title-section">
                    <h1>Gestor de Pedidos</h1>
                    <span class="status-badge-online"><i class="fas fa-circle"></i> Sistema Online</span>
                </div>
                <nav class="submenu-superior">
                    <button class="tab-link active" data-aba="geral">
                        <i class="fas fa-stream"></i> Pedidos Geral
                    </button>
                    <button class="tab-link" data-aba="flutuantes">
                        <i class="fas fa-columns"></i> Pedidos Flutuantes
                    </button>
                    <button class="tab-link" data-aba="historico">
                        <i class="fas fa-history"></i> Histórico de Pedidos
                    </button>
                </nav>
            </header>

            <div class="paineis-conteudo-area">

                <section id="painel-geral" class="aba-painel" style="display: block;">
                    <div class="esteira-titulos-header">
                        <div class="titulo-esteira t-pedidos">Pedidos <span class="badge-count" id="esteira-badge-pedidos">0</span></div>
                        <div class="titulo-esteira t-pagamento">Pagamento <span class="badge-count" id="esteira-badge-pagamento">0</span></div>
                        <div class="titulo-esteira t-preparo">Em Preparo <span class="badge-count" id="esteira-badge-preparo">0</span></div>
                        <div class="titulo-esteira t-entrega">Saiu para Entrega <span class="badge-count" id="esteira-badge-entrega">0</span></div>
                    </div>
                    <div class="esteira-linhas-container" id="lista-pedidos-linhas"></div>
                </section>

                <section id="painel-flutuantes" class="aba-painel" style="display: none;">
                    <div class="kanban-wrapper">
                        
                        <div class="kanban-column col-pedidos">
                            <div class="column-header">
                                <h3>Pedidos <span class="badge" id="badge-pedidos">0</span></h3>
                            </div>
                            <div class="kanban-cards-area" id="cards-pedidos"></div>
                        </div>

                        <div class="kanban-column col-pagamento">
                            <div class="column-header">
                                <h3>Pagamento <span class="badge" id="badge-pagamento">0</span></h3>
                            </div>
                            <div class="kanban-cards-area" id="cards-pagamento"></div>
                        </div>

                        <div class="kanban-column col-preparo">
                            <div class="column-header">
                                <h3>Em Preparo <span class="badge" id="badge-preparo">0</span></h3>
                            </div>
                            <div class="kanban-cards-area" id="cards-preparo"></div>
                        </div>

                        <div class="kanban-column col-entrega">
                            <div class="column-header">
                                <h3>Saiu para Entrega <span class="badge" id="badge-entrega">0</span></h3>
                            </div>
                            <div class="kanban-cards-area" id="cards-entrega"></div>
                        </div>

                    </div>
                </section>

                <section id="painel-historico" class="aba-painel" style="display: none;">
                    <div class="historico-box">
                        <div class="historico-header">
                            <h3>Histórico Geral de Pedidos</h3>
                            <div class="filtro-temporal">
                                <button class="btn-filtro active" data-periodo="hoje"><i class="fas fa-calendar-day"></i> Hoje</button>
                                <button class="btn-filtro" data-periodo="semana"><i class="fas fa-calendar-week"></i> Esta Semana</button>
                                <button class="btn-filtro" data-periodo="mes"><i class="fas fa-calendar-alt"></i> Este Mês</button>
                                <button class="btn-filtro" data-periodo="ano"><i class="fas fa-history"></i> Ano Corrente</button>
                            </div>
                        </div>

                        <div class="table-responsive">
                            <table class="historico-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Data/Hora</th>
                                        <th>Cliente</th>
                                        <th>Itens Pedidos</th>
                                        <th>Total</th>
                                        <th>Pagamento</th>
                                        <th>Status</th>
                                        <th style="text-align: center;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-historico-hoje">
                                    
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/pedidos.js"></script>
</body>
</html>
