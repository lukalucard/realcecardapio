<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Cardápio... - RealceCardápio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/cardapio-online.css">
</head>
<body>

    <div class="cardapio-client-container">
        
        <header class="restaurant-header" id="banner-topo-cliente">
            <div class="banner-overlay"></div>
            <div class="restaurant-info-box">
                <div class="restaurant-profile-img" id="container-logo-cliente">
                    <i class="fas fa-store" id="logo-cliente-icon"></i>
                    <img src="" id="logo-cliente-img" alt="Logo da loja" class="hidden">
                </div>
                <h1 class="restaurant-name" id="nome-loja-header">Realce<span>Cardápio</span></h1>
                <p class="restaurant-subtitle" id="slogan-loja">Carregando informações...</p>
                
                <div class="restaurant-badges">
                    <span class="badge-status open" id="status-loja-badge">
                        <i class="fas fa-circle"></i> Aberto
                    </span>
                    <span class="badge-delivery" id="delivery-info-badge">
                        <i class="fas fa-motorcycle"></i> -- min • R$ --
                    </span>
                </div>
            </div>
        </header>

        <nav class="categories-carousel" id="carousel-categorias"></nav>

        <main class="menu-products" id="vitrine-produtos"></main>

        <div class="persistent-cart-container hidden" id="persistent-cart">
            <div class="cart-title-area">
                <h3>Sua Sacola</h3>
            </div>
            
            <div class="cart-items-list" id="itens-sacola-direta"></div>
            
            <div class="cart-summary-footer">
                <div class="cart-total-line">
                    <span>Total dos itens:</span>
                    <strong id="cart-valor-total-tela">R$ 0,00</strong>
                </div>
                <button type="button" class="btn-go-to-delivery" id="btn-abrir-checkout">
                    Confirmar e Inserir Endereço <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div class="modal-overlay hidden" id="modal-detalhes-produto">
            <div class="modal-content">
                <header class="modal-header-product">
                    <button class="btn-back-modal" id="btn-fechar-detalhes"><i class="fas fa-chevron-down"></i></button>
                </header>
                
                <div class="product-modal-body">
                    <div class="product-gallery-slider" id="modal-produto-galeria"></div>

                    <div class="product-info-header">
                        <h2 id="modal-produto-nome">Nome do Produto</h2>
                        <span class="product-modal-price" id="modal-produto-preco">R$ 0,00</span>
                        <p id="modal-produto-descricao">Descrição ou ingredientes base.</p>
                    </div>

                    <div id="modal-produto-opcionais-container"></div>
                </div>

                <footer class="modal-product-footer">
                    <div class="qty-counter-container">
                        <button type="button" class="btn-qty-modal" id="btn-modal-menos"><i class="fas fa-minus"></i></button>
                        <span id="txt-modal-quantidade">1</span>
                        <button type="button" class="btn-qty-modal" id="btn-modal-mais"><i class="fas fa-plus"></i></button>
                    </div>
                    <button type="button" class="btn-add-to-bag" id="btn-modal-adicionar-sacola">
                        Adicionar <span id="txt-modal-botao-preco">R$ 0,00</span>
                    </button>
                </footer>
            </div>
        </div>

        <div class="modal-overlay hidden" id="modal-dados-entrega">
            <div class="modal-content">
                <header class="modal-header">
                    <h2>Dados de Entrega</h2>
                    <button class="btn-close-modal" id="btn-fechar-modal-dados">
                        <i class="fas fa-times"></i>
                    </button>
                </header>

                <form class="checkout-form" id="form-checkout">
                    <div class="form-group">
                        <label for="checkout-nome">Seu Nome</label>
                        <input type="text" id="checkout-nome" placeholder="Ex: Luiz Silva" required>
                    </div>
                    <div class="form-group">
                        <label for="checkout-whatsapp">Seu WhatsApp</label>
                        <input type="tel" id="checkout-whatsapp" placeholder="Ex: 62999999999" required>
                    </div>
                    <div class="form-group">
                        <label for="checkout-endereco">Endereço de Entrega</label>
                        <textarea id="checkout-endereco" rows="2" placeholder="Rua, Número, Bairro e Complemento" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="checkout-pagamento">Forma de Pagamento</label>
                        <select id="checkout-pagamento" required>
                            <option value="">Selecione...</option>
                            <option value="Pix">Pix</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>
                </form>

                <footer class="modal-footer">
                    <div class="modal-total-section">
                        <span>Total Geral (<span id="txt-label-taxa-checkout">com entrega</span>):</span>
                        <strong id="modal-total-final-valor">R$ 0,00</strong>
                    </div>
                    <button type="button" class="btn-finalize-order" id="btn-enviar-pedido">
                        Finalizar Pedido <i class="fas fa-check-circle"></i>
                    </button>
                </footer>
            </div>
        </div>

    </div>

    <script src="js/cardapio-online.js"></script>
</body>
</html>
